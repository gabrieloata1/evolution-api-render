services:
  - type: web
    name: evolution-api
    runtime: docker
    plan: free
    envVars:
      - key: AUTHENTICATION_API_KEY
        generateValue: true
      - key: DATABASE_ENABLED
        value: "false"
      - key: CACHE_REDIS_ENABLED
        value: "false"
      - key: WEBHOOK_GLOBAL_ENABLED
        value: "false"
      - key: LOG_LEVEL
        value: "error"
    dockerContext: .
    dockerfilePath: Dockerfile
